<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Prenotazione - Ateliere</title>
    <style>
        body {
            background-color: white; /* Nero profondo */
            color: #d4af37; /* Oro metallico */
            font-family: 'Playfair Display', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }

      
        h1 {
            color: #d4af37; 
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .booking-container {
            background: white;
            padding: 40px;
            border: 1px solid #333;
            border-radius: 2px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: none;
            border-bottom: 1px solid #d4af37;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-bottom: 2px solid #fff;
        }

        /* Personalizzazione del menu a tendina */
        option {
            background: #1a1a1a;
            color: #fff;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: #d4af37;
            color: #0f0f0f;
            border: none;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        button:hover {
            background-color: #fff;
            letter-spacing: 4px;
        }

        .note {
            font-size: 0.8rem;
            color: #888;
            text-align: center;
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>
<body>

    <h1>Ateliere Prenotazioni</h1>

    <div class="booking-container">
        <form action="#">
            <div class="form-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Es. Giuseppe,Ach" required>
            </div>

            <div class="form-group">
                <label for="data">Data della Visita</label>
                <input type="date" id="data" name="data" required>
            </div>

            <div class="form-group">
                <label for="ospiti">Numero di Ospiti</label>
                <select id="ospiti" name="ospiti">
                    <option value="2">2 Persone</option>
                    <option value="3">3 Persone</option>
                    <option value="4">4 Persone</option>
                    <option value="5+">Oltre 5 (Contattateci)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="richieste">Richieste Particolari o Allergie</label>
                <textarea id="richieste" name="richieste" rows="3" placeholder="Note per lo Chef..."></textarea>
            </div>

            <button type="submit">Riserva il Tavolo</button>
        </form>
        <p class="note">L'esperienza gastronomica richiede puntualità.</p>
    </div>

</body>
</html>
