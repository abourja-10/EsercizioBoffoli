<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contatti</title>
    <link rel="icon" type="image/x-icon" href="icona.jpg">
     <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
    * {
        margin: 0;
        padding: 0;
    }
    h1 {
        border: 1px solid #f3e5ab;
        background-color: #f3e5ab;
        color: #b38728;
        text-align: center;
        padding: 50px 50px;
        font-family: 'Playfair Display', serif;
        font-size: 50px;
    }
    fieldset {
        border: none;
    }
    label {display: block;}

input[type=text], select {
  width: 70%;
  padding: 12px;
  margin: 8px 0;
  display: inline-block;
  border: 1px solid #ccc;
  border-radius: 4px;
  box-sizing: border-box;
}



    </style>
</head>
<body>
    <div id="container">
    <h1>PER PRENOTAZIONI O CONTATTARCI</h1>
     <fieldset>
        Inserire i dati e premere INVIO per vederne i risultati <br>
        <label> Nome e Cognome:</label>
         <input name="nome" type="text" required autofocus="autofocus"> <br>
        Cliente abituale <input type="checkbox"> <br>
        Provincia di residenza: <select name="citta" size="1">
        <option value="Milano">Milano</option>
        <option value="Como">Como</option>
        <option value="Bergamo">Bergamo</option>
        <option value="Lordi">Lordi</option>
        <option value="Brescia">Brescia</option>
        <option value="Sondrio">Sondrio</option>
        <option value="Pavia">Pavia</option>
        <option value="Monza">Monza</option>
        <option value="Mantova">Mantova</option>
        <option value="Cremona">Cremona</option>
        </select> <br>
        Testo Lettera: <br>
        <input type="text"> <br>
        <input type="reset" value="Reimposta">
        <input type="reset" value="Invia">
        
    </fieldset>

    </div>

    
</body>
</html>
